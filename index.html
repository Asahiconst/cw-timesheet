<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <title>旭建設CW出勤簿アプリ</title>
  <style>
    :root{
      --blue:#0ea5e9; --blue-d:#0284c7; --blue-l:#bae6fd; --blue-bg:#f0f9ff;
      --ink:#0f172a; --gray:#64748b; --line:#e2e8f0;
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    body{margin:0; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI",sans-serif;
      background:var(--blue-bg); color:var(--ink); padding-bottom:84px; font-size:15px;}
    header{background:linear-gradient(135deg,var(--blue),var(--blue-d)); color:#fff;
      padding:12px 16px; text-align:center; box-shadow:0 2px 8px rgba(2,132,199,.3);}
    header h1{margin:0; font-size:17px; letter-spacing:.5px;}
    header p{margin:2px 0 0; font-size:11px; opacity:.9;}
    .wrap{max-width:540px; margin:0 auto; padding:10px;}
    .card{background:#fff; border-radius:14px; padding:4px 14px; margin-bottom:10px;
      box-shadow:0 1px 4px rgba(15,23,42,.06); border:1px solid var(--line);}

    /* 横並び1項目 */
    .item{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line);}
    .item:last-child{border-bottom:none;}
    .item > .lbl{flex:0 0 3.4em; font-size:14px; font-weight:700; color:var(--ink);
      text-align:justify; text-align-last:justify;}
    .item > .lbl.wide{flex:0 0 7.4em; text-align-last:left;}
    .item > .ctrl{flex:1; min-width:0;}

    select,input[type=date]{width:100%; padding:11px 10px; font-size:16px; border:2px solid var(--line);
      border-radius:10px; background:#fff; color:var(--ink); appearance:none;}
    select:focus,input:focus{outline:none; border-color:var(--blue);}

    .leave-chip{flex:0 0 auto; background:var(--blue-l); color:var(--blue-d); font-weight:700;
      border-radius:20px; padding:6px 11px; font-size:13px; white-space:nowrap;}
    .leave-chip b{font-size:17px; margin:0 2px;}

    /* 選択ボタン（未選択=白／選択=青） */
    .btns{display:grid; gap:7px;}
    .btns.two{grid-template-columns:1fr 1fr;}
    .btns.three{grid-template-columns:1fr 1fr 1fr;}
    .btns.four{grid-template-columns:1fr 1fr 1fr 1fr;}
    .opt{padding:11px 4px; font-size:15px; font-weight:700; border:2px solid var(--line);
      border-radius:10px; background:#fff; color:var(--gray); cursor:pointer; transition:.12s;}
    .opt.on{background:var(--blue); color:#fff; border-color:var(--blue); box-shadow:0 2px 6px rgba(14,165,233,.4);}

    /* 現場プルダウン */
    .site-block{padding:10px 0; border-bottom:1px solid var(--line);}
    .site-block:last-child{border-bottom:none;}
    .site-row{display:flex; flex-wrap:wrap; gap:7px; align-items:center; margin-top:8px;}
    .site-row:first-child{margin-top:0;}
    .site-row select{flex:1;}
    .site-row .rlbl{flex:0 0 2.6em; font-size:13px; font-weight:700; color:var(--gray);
      text-align:justify; text-align-last:justify;}
    .other-input{flex:1 1 100%; padding:11px 10px; font-size:16px; border:2px solid var(--line);
      border-radius:10px; background:#fff; color:var(--ink);}
    .other-input:focus{outline:none; border-color:var(--blue);}

    /* 残業時間 */
    .ot-times{padding:8px 0 2px;}
    .row2{display:flex; align-items:center; gap:8px; justify-content:center;}
    .row2 .tilde{font-size:16px; color:var(--gray);}
    .time-sel select{padding:9px 4px; font-size:15px; min-width:72px;}

    /* 距離（電卓入力） */
    .dist-display{width:100%; padding:11px 12px; font-size:19px; font-weight:700; text-align:right;
      border:2px solid var(--line); border-radius:10px; background:#fff; cursor:pointer; color:var(--ink);}
    .dist-display .unit{font-size:13px; color:var(--gray); margin-left:5px; font-weight:400;}

    /* 同乗者 */
    .pass-block{padding:9px 0;}
    .pass-head{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
    .pass-head .lbl{flex:0 0 3.4em; font-size:14px; font-weight:700;
      text-align:justify; text-align-last:justify;}
    .add-btn{flex:1; width:100%; padding:9px; font-size:13px; font-weight:700; border:2px dashed var(--blue);
      border-radius:10px; background:#fff; color:var(--blue-d); cursor:pointer;}
    .passenger-row{display:flex; gap:7px; margin-top:7px; align-items:center; padding-left:calc(3.4em + 10px);}
    .passenger-row select{flex:1;}
    .del-x{flex:0 0 auto; width:40px; height:42px; border:2px solid #fecaca; background:#fff;
      color:#ef4444; border-radius:10px; font-size:18px; cursor:pointer;}

    .hide{display:none !important;}

    .footer{position:fixed; left:0; right:0; bottom:0; background:#fff; padding:10px 12px;
      box-shadow:0 -2px 10px rgba(15,23,42,.1); border-top:1px solid var(--line);}
    .submit{display:block; width:100%; max-width:540px; margin:0 auto; padding:15px;
      font-size:18px; font-weight:800; color:#fff; background:linear-gradient(135deg,var(--blue),var(--blue-d));
      border:none; border-radius:13px; cursor:pointer; box-shadow:0 4px 12px rgba(2,132,199,.4);}
    .submit:disabled{opacity:.5;}

    /* 電卓モーダル */
    .modal{position:fixed; inset:0; background:rgba(15,23,42,.55); display:none;
      align-items:flex-end; justify-content:center; z-index:50;}
    .modal.show{display:flex;}
    .calc{background:#fff; width:100%; max-width:420px; border-radius:20px 20px 0 0; padding:16px;}
    .calc-head{font-size:14px; font-weight:700; margin-bottom:6px;}
    .calc-screen{font-size:30px; font-weight:800; text-align:right; padding:12px 14px;
      background:var(--blue-bg); border-radius:12px; margin-bottom:12px; min-height:54px;}
    .calc-screen .unit{font-size:15px; color:var(--gray);}
    .keys{display:grid; grid-template-columns:repeat(3,1fr); gap:9px;}
    .key{padding:17px 0; font-size:22px; font-weight:700; border:1px solid var(--line);
      border-radius:13px; background:#fff; cursor:pointer;}
    .key:active{background:var(--blue-l);}
    .key.fn{background:#fef2f2; color:#ef4444;}
    .key.ok{grid-column:span 3; background:var(--blue); color:#fff; border:none; font-size:19px;}

    .toast{position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(15,23,42,.92); color:#fff; padding:22px 28px; border-radius:16px;
      font-size:16px; text-align:center; z-index:99; display:none;}
    .toast.show{display:block;}
    .admin-link{text-align:center; margin:18px 0 6px;}
    .admin-link a{font-size:9px; color:#cbd5e1; text-decoration:none;}
  </style>
</head>
<body>
  <header>
    <h1>旭建設CW出勤簿</h1>
    <p>シビルワーカー 出勤入力</p>
  </header>

  <div class="wrap">

    <!-- お名前・日付 -->
    <div class="card">
      <div class="item">
        <div class="lbl">お名前</div>
        <div class="ctrl">
          <select id="user" onchange="onUserChange()"><option value="">― 選択 ―</option></select>
        </div>
        <div class="leave-chip" id="leaveBox" style="display:none">有給残<b id="leaveVal">―</b>日</div>
      </div>
      <div class="item">
        <div class="lbl">日付</div>
        <div class="ctrl"><input type="date" id="date" onchange="loadExisting()"></div>
      </div>
    </div>

    <!-- 出勤・現場・残業・宿泊・車両 -->
    <div class="card">
      <!-- 出勤 -->
      <div class="item">
        <div class="lbl">出勤</div>
        <div class="ctrl">
          <div class="btns four">
            <button class="opt" data-g="att" data-v="終日" onclick="pick(this); onAtt()">終日</button>
            <button class="opt" data-g="att" data-v="午前" onclick="pick(this); onAtt()">午前</button>
            <button class="opt" data-g="att" data-v="午後" onclick="pick(this); onAtt()">午後</button>
            <button class="opt" data-g="att" data-v="休み" onclick="pick(this); onAtt()">休み</button>
          </div>
        </div>
      </div>

      <!-- 現場（単一/複数）：終日のときだけ表示 -->
      <div class="item hide" id="siteModeRow">
        <div class="lbl">現場</div>
        <div class="ctrl">
          <div class="btns two">
            <button class="opt" data-g="sitemode" data-v="単一" onclick="pick(this); onSiteMode()">単一現場</button>
            <button class="opt" data-g="sitemode" data-v="複数" onclick="pick(this); onSiteMode()">複数現場</button>
          </div>
        </div>
      </div>

      <!-- 現場プルダウン -->
      <div class="site-block hide" id="siteArea">
        <div id="siteList"></div>
        <button class="add-btn hide" id="siteAddBtn" type="button" onclick="addSiteSelect()" style="margin-top:8px;">＋ 現場を追加</button>
      </div>

      <!-- 残業 -->
      <div class="item">
        <div class="lbl">残業</div>
        <div class="ctrl">
          <div class="btns two">
            <button class="opt" data-g="ot" data-v="あり" onclick="pick(this); toggleOT()">あり</button>
            <button class="opt" data-g="ot" data-v="なし" onclick="pick(this); toggleOT()">なし</button>
          </div>
        </div>
      </div>
      <div class="item ot-times hide" id="otArea" style="display:none">
        <div style="width:100%">
          <div class="row2">
            <div class="time-sel"><select id="otSH"></select></div>
            <span class="tilde">〜</span>
            <div class="time-sel"><select id="otEH"></select></div>
          </div>
        </div>
      </div>

      <!-- 宿泊 -->
      <div class="item">
        <div class="lbl">宿泊</div>
        <div class="ctrl">
          <div class="btns two">
            <button class="opt" data-g="stay" data-v="あり" onclick="pick(this); toggleStay()">あり</button>
            <button class="opt" data-g="stay" data-v="なし" onclick="pick(this); toggleStay()">なし</button>
          </div>
        </div>
      </div>
      <div class="item hide" id="mealArea">
        <div class="lbl">食事</div>
        <div class="ctrl">
          <div class="btns two">
            <button class="opt" data-g="meal" data-v="あり" onclick="pick(this)">あり</button>
            <button class="opt" data-g="meal" data-v="なし" onclick="pick(this)">なし</button>
          </div>
        </div>
      </div>

      <!-- 車両 -->
      <div class="item">
        <div class="lbl">車両</div>
        <div class="ctrl">
          <div class="btns two">
            <button class="opt" data-g="car" data-v="社用車" onclick="pick(this)">社用車</button>
            <button class="opt" data-g="car" data-v="自家用車" onclick="pick(this)">自家用車</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 通勤距離・運転者・同乗者 -->
    <div class="card">
      <div class="item">
        <div class="lbl wide">自宅〜現場</div>
        <div class="ctrl">
          <div class="dist-display" onclick="openCalc('distGenba')">
            <span id="distGenba">0</span><span class="unit">km</span>
          </div>
        </div>
      </div>
      <div class="item">
        <div class="lbl wide">自宅〜集合場所</div>
        <div class="ctrl">
          <div class="dist-display" onclick="openCalc('distShugo')">
            <span id="distShugo">0</span><span class="unit">km</span>
          </div>
        </div>
      </div>

      <!-- 運転者 -->
      <div class="item">
        <div class="lbl">運転者</div>
        <div class="ctrl">
          <div class="btns two">
            <button class="opt" data-g="drv" data-v="自分" onclick="pick(this); toggleDriver()">自分</button>
            <button class="opt" data-g="drv" data-v="自分以外" onclick="pick(this); toggleDriver()">自分以外</button>
          </div>
        </div>
      </div>
      <div class="item hide" id="driverArea" style="display:none">
        <div style="width:100%">
          <select id="driver"><option value="">― 運転者を選択 ―</option></select>
        </div>
      </div>

      <!-- 同乗者 -->
      <div class="pass-block">
        <div class="pass-head">
          <div class="lbl">同乗者</div>
          <button class="add-btn" type="button" onclick="addPassenger()">＋ 同乗者を追加</button>
        </div>
        <div id="passengers"></div>
      </div>
    </div>

    <div class="admin-link"><a href="#" id="adminLink">管理画面はこちら</a></div>
  </div>

  <div class="footer">
    <button class="submit" id="submitBtn" onclick="submit()">この内容で登録する</button>
  </div>

  <!-- 電卓モーダル -->
  <div class="modal" id="calcModal">
    <div class="calc">
      <div class="calc-head">距離を入力（km）</div>
      <div class="calc-screen"><span id="calcScreen">0</span><span class="unit"> km</span></div>
      <div class="keys">
        <button class="key" onclick="ck('7')">7</button>
        <button class="key" onclick="ck('8')">8</button>
        <button class="key" onclick="ck('9')">9</button>
        <button class="key" onclick="ck('4')">4</button>
        <button class="key" onclick="ck('5')">5</button>
        <button class="key" onclick="ck('6')">6</button>
        <button class="key" onclick="ck('1')">1</button>
        <button class="key" onclick="ck('2')">2</button>
        <button class="key" onclick="ck('3')">3</button>
        <button class="key" onclick="ck('.')">.</button>
        <button class="key" onclick="ck('0')">0</button>
        <button class="key fn" onclick="ck('back')">⌫</button>
        <button class="key fn" onclick="ck('clear')">クリア</button>
        <button class="key ok" onclick="closeCalc()">決定</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let USERS = [];
    let SITES = [];
    let calcBuf = '0';
    let calcTarget = 'distGenba';
    let editingId = null;   // 既存データを修正中ならその記録ID

    window.onload = function(){
      var t = new Date();
      document.getElementById('date').value =
        t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');

      ['otSH','otEH'].forEach(function(id){
        var s=document.getElementById(id);
        for(var h=0;h<24;h++){ s.add(new Option(String(h).padStart(2,'0')+'時', String(h).padStart(2,'0'))); }
      });

      google.script.run.withSuccessHandler(fillUsers).getActiveUsers();
      google.script.run.withSuccessHandler(fillSites).getActiveSites();
      google.script.run.withSuccessHandler(function(url){
        document.getElementById('adminLink').href = url + '?page=admin';
      }).getAppUrl();

      addPassenger();
    };

    function fillUsers(list){
      USERS=list;
      var sel=document.getElementById('user'), drv=document.getElementById('driver');
      list.forEach(function(u){ sel.add(new Option(u.name,u.name)); drv.add(new Option(u.name,u.name)); });
      refreshPassengerOptions();
    }
    function fillSites(list){ SITES=list; }

    /* ===== お名前・既存データ読込 ===== */
    function onUserChange(){
      var name=document.getElementById('user').value;
      var u=USERS.find(function(x){return x.name===name;});
      var box=document.getElementById('leaveBox');
      if(u){ document.getElementById('leaveVal').textContent=(u.leave===''||u.leave==null)?'―':u.leave; box.style.display='block'; }
      else box.style.display='none';
      loadExisting();
    }
    function loadExisting(){
      var name=document.getElementById('user').value;
      var date=document.getElementById('date').value;
      if(!name || !date){ return; }
      google.script.run.withSuccessHandler(populateForm).getRecordForEdit(name, date);
    }
    function selectOpt(group, val){
      if(val==null || val==='') return null;
      var b=document.querySelector('.opt[data-g="'+group+'"][data-v="'+val+'"]');
      if(b) pick(b);
      return b;
    }
    function setOtTime(id, val){
      if(!val) return;
      var h=parseInt(val,10);
      if(!isNaN(h)) document.getElementById(id).value=String(h).padStart(2,'0');
    }
    function updateSubmitLabel(){
      document.getElementById('submitBtn').textContent = editingId ? 'この内容で上書き保存する' : 'この内容で登録する';
    }
    // 既存データをフォームへ展開（recがnullなら空欄）
    function populateForm(rec){
      clearInputs();
      if(!rec){ editingId=null; updateSubmitLabel(); return; }
      editingId=rec.id;
      var name=document.getElementById('user').value;

      selectOpt('att', rec.attendance); onAtt();

      var sites = rec.site ? String(rec.site).split('、') : [];
      if(rec.attendance==='終日'){
        var modeVal = (rec.siteMode==='複数現場') ? '複数' : '単一';
        selectOpt('sitemode', modeVal);
        onSiteMode();
        if(modeVal==='複数'){ while(document.querySelectorAll('#siteList select').length < sites.length){ addSiteSelect(); } }
        var ss=document.querySelectorAll('#siteList select');
        sites.forEach(function(s,i){ if(ss[i]) setRowSite(ss[i], s); });
      } else if(rec.attendance==='午前' || rec.attendance==='午後'){
        var ss2=document.querySelectorAll('#siteList select');  // onAtt が1つ用意済み
        if(ss2[0]) setRowSite(ss2[0], sites[0] || '');
      }

      selectOpt('ot', rec.overtime); toggleOT();
      if(rec.overtime==='あり'){ setOtTime('otSH', rec.otStart); setOtTime('otEH', rec.otEnd); }

      selectOpt('stay', rec.stay); toggleStay();
      if(rec.stay==='あり' && rec.meal){ selectOpt('meal', rec.meal); }

      selectOpt('car', rec.carType);

      if(rec.commuteGenba!=='' && rec.commuteGenba!=null) document.getElementById('distGenba').textContent=rec.commuteGenba;
      if(rec.commuteShugo!=='' && rec.commuteShugo!=null) document.getElementById('distShugo').textContent=rec.commuteShugo;

      if(rec.driver){
        if(rec.driver===name){ selectOpt('drv','自分'); toggleDriver(); }
        else { selectOpt('drv','自分以外'); toggleDriver(); document.getElementById('driver').value=rec.driver; }
      }

      var ps = rec.passengers ? String(rec.passengers).split('、') : [];
      document.getElementById('passengers').innerHTML='';
      if(ps.length===0){ addPassenger(); }
      else { ps.forEach(function(){ addPassenger(); }); var pse=document.querySelectorAll('#passengers select'); ps.forEach(function(p,i){ if(pse[i]) pse[i].value=p; }); }

      updateSubmitLabel();
    }

    /* ===== ボタン選択 ===== */
    function pick(btn){
      var g=btn.getAttribute('data-g');
      document.querySelectorAll('.opt[data-g="'+g+'"]').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');
    }
    function getPick(g){ var b=document.querySelector('.opt[data-g="'+g+'"].on'); return b?b.getAttribute('data-v'):''; }

    /* ===== 現場 ===== */
    function addSiteRow(label, removable){
      var wrap=document.getElementById('siteList');
      var row=document.createElement('div'); row.className='site-row';
      if(label){ var l=document.createElement('div'); l.className='rlbl'; l.textContent=label; row.appendChild(l); }
      var sel=document.createElement('select');
      sel.innerHTML='<option value="">― 現場を選択 ―</option>';
      SITES.forEach(function(s){ sel.add(new Option(s,s)); });
      sel.add(new Option('その他（手入力）','その他'));
      var other=document.createElement('input');
      other.type='text'; other.className='other-input hide'; other.placeholder='現場名を入力';
      sel.onchange=function(){
        var on=sel.value==='その他';
        other.classList.toggle('hide', !on);
        if(!on) other.value='';
      };
      row.appendChild(sel);
      if(removable){
        var del=document.createElement('button'); del.className='del-x'; del.type='button'; del.textContent='×';
        del.onclick=function(){ row.remove(); };
        row.appendChild(del);
      }
      row.appendChild(other);
      wrap.appendChild(row);
    }
    function addSiteSelect(){ addSiteRow('追加', true); }
    function onSiteMode(){
      var mode=getPick('sitemode');
      var area=document.getElementById('siteArea');
      var addBtn=document.getElementById('siteAddBtn');
      document.getElementById('siteList').innerHTML='';
      if(mode==='単一'){
        area.classList.remove('hide');
        addSiteRow('', false);
        addBtn.classList.add('hide');
      } else if(mode==='複数'){
        area.classList.remove('hide');
        addSiteRow('午前', false);
        addSiteRow('午後', false);
        addBtn.classList.remove('hide');
      } else {
        area.classList.add('hide');
      }
    }
    // 出勤区分に応じて現場入力を出し分け
    function onAtt(){
      var att=getPick('att');
      document.querySelectorAll('.opt[data-g="sitemode"].on').forEach(function(b){ b.classList.remove('on'); });
      document.getElementById('siteList').innerHTML='';
      document.getElementById('siteArea').classList.add('hide');
      document.getElementById('siteAddBtn').classList.add('hide');
      document.getElementById('siteModeRow').classList.add('hide');

      if(att==='終日'){
        document.getElementById('siteModeRow').classList.remove('hide');   // 単一/複数を選ぶ
      } else if(att==='午前' || att==='午後'){
        document.getElementById('siteArea').classList.remove('hide');       // 現場プルダウン1つを直接
        addSiteRow('', false);
      }
      // 休み・未選択：現場入力なし
    }
    function getSites(){
      var arr=[];
      document.querySelectorAll('#siteList .site-row').forEach(function(row){
        var sel=row.querySelector('select');
        if(!sel) return;
        if(sel.value==='その他'){
          var t=row.querySelector('.other-input');
          var v=t?t.value.trim():'';
          if(v) arr.push(v);
        } else if(sel.value){
          arr.push(sel.value);
        }
      });
      return arr;
    }
    // 既存値をプルダウンに設定（登録済みになければ「その他」＋手入力に流し込む）
    function setRowSite(sel, value){
      if(!value) return;
      var exists=Array.prototype.some.call(sel.options, function(o){ return o.value===value; });
      if(exists && value!=='その他'){ sel.value=value; return; }
      sel.value='その他';
      var row=sel.closest('.site-row');
      var t=row?row.querySelector('.other-input'):null;
      if(t){ t.classList.remove('hide'); t.value=value; }
    }

    /* ===== 残業・運転者・宿泊 ===== */
    function toggleOT(){
      var on=getPick('ot')==='あり';
      var a=document.getElementById('otArea');
      a.classList.toggle('hide', !on);
      a.style.display = on ? 'flex' : 'none';
    }
    function toggleDriver(){
      var on=getPick('drv')==='自分以外';
      var a=document.getElementById('driverArea');
      a.classList.toggle('hide', !on);
      a.style.display = on ? 'flex' : 'none';
      if(!on) document.getElementById('driver').value='';
    }
    function toggleStay(){
      var on=getPick('stay')==='あり';
      document.getElementById('mealArea').classList.toggle('hide', !on);
      if(!on) document.querySelectorAll('.opt[data-g="meal"].on').forEach(function(b){b.classList.remove('on');});
    }

    /* ===== 同乗者 ===== */
    function addPassenger(){
      var wrap=document.getElementById('passengers');
      var row=document.createElement('div'); row.className='passenger-row';
      var sel=document.createElement('select');
      sel.innerHTML='<option value="">― 選択 ―</option>';
      USERS.forEach(function(u){ sel.add(new Option(u.name,u.name)); });
      var del=document.createElement('button'); del.className='del-x'; del.type='button'; del.textContent='×';
      del.onclick=function(){ row.remove(); };
      row.appendChild(sel); row.appendChild(del); wrap.appendChild(row);
    }
    function refreshPassengerOptions(){
      document.querySelectorAll('#passengers select').forEach(function(sel){
        var cur=sel.value; sel.innerHTML='<option value="">― 選択 ―</option>';
        USERS.forEach(function(u){ sel.add(new Option(u.name,u.name)); }); sel.value=cur;
      });
    }
    function getPassengers(){
      var arr=[]; document.querySelectorAll('#passengers select').forEach(function(sel){ if(sel.value) arr.push(sel.value); }); return arr;
    }

    /* ===== 電卓 ===== */
    function openCalc(target){ calcTarget=target||'distGenba'; calcBuf=document.getElementById(calcTarget).textContent||'0'; if(calcBuf==='―')calcBuf='0'; render(); document.getElementById('calcModal').classList.add('show'); }
    function closeCalc(){ document.getElementById(calcTarget).textContent=trim(calcBuf); document.getElementById('calcModal').classList.remove('show'); }
    function ck(k){
      if(k==='clear'){calcBuf='0';}
      else if(k==='back'){calcBuf=calcBuf.length>1?calcBuf.slice(0,-1):'0';}
      else if(k==='.'){ if(calcBuf.indexOf('.')<0)calcBuf+='.'; }
      else { calcBuf=(calcBuf==='0')?k:calcBuf+k; }
      render();
    }
    function render(){ document.getElementById('calcScreen').textContent=calcBuf; }
    function trim(v){ if(v.endsWith('.'))v=v.slice(0,-1); return v===''?'0':v; }
    function toast(msg,ms){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); if(ms!==0) setTimeout(function(){t.classList.remove('show');},ms||1800); }

    /* ===== 保存 ===== */
    function submit(){
      var name=document.getElementById('user').value;
      var date=document.getElementById('date').value;
      var ot=getPick('ot'), stay=getPick('stay'), meal=getPick('meal'), car=getPick('car'), drv=getPick('drv');

      if(!name){alert('お名前を選択してください');return;}
      if(!date){alert('日付を選択してください');return;}

      var att=getPick('att');
      if(!att){alert('出勤（終日／午前／午後／休み）を選択してください');return;}
      var siteLabel='', siteModeLabel='', workDays=0;
      if(att==='休み'){
        siteLabel='休み'; siteModeLabel=''; workDays=0;
      } else if(att==='終日'){
        var sitemode=getPick('sitemode');
        if(!sitemode){alert('現場（単一現場／複数現場）を選択してください');return;}
        var sites=getSites();
        if(sites.length===0){alert('現場を選んでください');return;}
        siteLabel=sites.join('、');
        siteModeLabel=(sitemode==='単一')?'単一現場':'複数現場';
        workDays=1;
      } else {   // 午前 / 午後（単一現場前提）
        var sites2=getSites();
        if(sites2.length===0){alert('現場を選んでください');return;}
        siteLabel=sites2.join('、');
        siteModeLabel='単一現場';
        workDays=0.5;
      }

      if(!ot){alert('残業のあり/なしを選択してください');return;}
      if(!stay){alert('宿泊のあり/なしを選択してください');return;}
      if(stay==='あり' && !meal){alert('食事のあり/なしを選択してください');return;}
      if(!car){alert('車両を選択してください');return;}
      if(!drv){alert('運転者（自分／自分以外）を選択してください');return;}
      if(drv==='自分以外' && !document.getElementById('driver').value){alert('運転者を選択してください');return;}

      var data={
        userName:name, date:date, attendance:att, siteMode:siteModeLabel,
        site:siteLabel, workDays:workDays, overtime:ot,
        overtimeStart: ot==='あり'?(document.getElementById('otSH').value+'時'):'',
        overtimeEnd:   ot==='あり'?(document.getElementById('otEH').value+'時'):'',
        stay:stay,
        meal: stay==='あり' ? meal : '',
        carType:car,
        commuteGenba:document.getElementById('distGenba').textContent.replace('―','0'),
        commuteShugo:document.getElementById('distShugo').textContent.replace('―','0'),
        driver: drv==='自分' ? name : document.getElementById('driver').value,
        passengers:getPassengers()
      };

      var btn=document.getElementById('submitBtn');
      btn.disabled=true; btn.textContent='保存中...'; toast('保存中...',0);
      var wasEditing=!!editingId;
      var runner=google.script.run
        .withSuccessHandler(function(res){
          toast(wasEditing?'更新しました！':'登録しました！');
          if(res && res.id){ editingId=res.id; }
          btn.disabled=false; updateSubmitLabel();
        })
        .withFailureHandler(function(e){ toast('エラー: '+e.message,3000); btn.disabled=false; updateSubmitLabel(); });
      if(editingId){ runner.updateRecord(editingId, data); } else { runner.submitRecord(data); }
    }

    // 入力欄だけ初期化（お名前・日付は残す）
    function clearInputs(){
      document.querySelectorAll('.opt.on').forEach(function(b){b.classList.remove('on');});
      var a=document.getElementById('otArea'); a.classList.add('hide'); a.style.display='none';
      var d=document.getElementById('driverArea'); d.classList.add('hide'); d.style.display='none';
      document.getElementById('mealArea').classList.add('hide');
      document.getElementById('siteModeRow').classList.add('hide');
      document.getElementById('siteList').innerHTML='';
      document.getElementById('siteArea').classList.add('hide');
      document.getElementById('siteAddBtn').classList.add('hide');
      document.getElementById('distGenba').textContent='0';
      document.getElementById('distShugo').textContent='0';
      document.getElementById('driver').value='';
      document.getElementById('passengers').innerHTML=''; addPassenger();
    }
  </script>
</body>
</html>
