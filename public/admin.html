<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0ea5e9">
  <title>管理画面 | 旭建設CW出勤簿アプリ</title>
  <style>
    :root{
      --blue:#0ea5e9; --blue-d:#0284c7; --blue-l:#bae6fd; --blue-bg:#f0f9ff;
      --ink:#0f172a; --gray:#64748b; --line:#e2e8f0;
    }
    *{box-sizing:border-box;}
    body{margin:0; font-family:"Yu Gothic UI","Hiragino Kaku Gothic ProN",sans-serif;
      background:var(--blue-bg); color:var(--ink); -webkit-text-size-adjust:100%;}
    header{background:linear-gradient(135deg,var(--blue),var(--blue-d)); color:#fff;
      padding:14px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;}
    header h1{margin:0; font-size:17px; flex:1; min-width:0;}
    .wrap{max-width:1800px; width:97%; margin:0 auto; padding:20px;}

    .login{max-width:360px; margin:80px auto; background:#fff; border-radius:16px;
      padding:32px; box-shadow:0 4px 20px rgba(2,132,199,.15); text-align:center;}
    .login h2{margin:0 0 6px; font-size:20px;}
    .login p{margin:0 0 22px; color:var(--gray); font-size:13px;}
    .login input{width:100%; padding:13px; margin-bottom:12px; font-size:15px;
      border:2px solid var(--line); border-radius:10px;}
    .login input:focus{outline:none; border-color:var(--blue);}
    .btn{padding:10px 16px; font-size:14px; font-weight:700; color:#fff;
      background:linear-gradient(135deg,var(--blue),var(--blue-d)); border:none;
      border-radius:10px; cursor:pointer; white-space:nowrap;}
    .btn:hover{opacity:.92;}
    .btn.full{width:100%; padding:14px; font-size:15px;}
    .btn.sm{padding:8px 13px; font-size:13px;}
    .btn.gray{background:#e2e8f0; color:var(--ink);}
    .btn.green{background:linear-gradient(135deg,#22c55e,#16a34a);}
    .btn.red{background:linear-gradient(135deg,#ef4444,#dc2626);}

    .tabs{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
    .tab{padding:10px 16px; font-size:14px; font-weight:700; background:#fff; color:var(--gray);
      border:2px solid var(--line); border-radius:10px; cursor:pointer; white-space:nowrap;}
    .tab.on{background:var(--blue); color:#fff; border-color:var(--blue);}

    .panel{display:none;}
    .panel.on{display:block;}
    .card{background:#fff; border-radius:14px; padding:18px; margin-bottom:16px;
      box-shadow:0 1px 4px rgba(15,23,42,.06); border:1px solid var(--line);}
    .card h3{margin:0 0 12px; font-size:15px;}
    .form-row{display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; margin-bottom:6px;}
    .field{display:flex; flex-direction:column; gap:4px;}
    .field label{font-size:12px; color:var(--gray); font-weight:700;}
    .field input,.field select{padding:10px; font-size:14px; border:2px solid var(--line);
      border-radius:8px; min-width:160px;}
    .field input:focus,.field select:focus{outline:none; border-color:var(--blue);}

    table{width:100%; border-collapse:collapse; font-size:12px; table-layout:fixed;}
    th,td{padding:7px 8px; text-align:left; border-bottom:1px solid var(--line);
      white-space:normal; word-break:break-word; vertical-align:top;}
    th{background:var(--blue-bg); color:var(--blue-d); font-size:11px;}
    #recTable th:nth-child(1),#recTable td:nth-child(1){width:5%;}
    #recTable th:nth-child(6),#recTable td:nth-child(6){width:3%;}
    #recTable th:nth-child(7),#recTable td:nth-child(7){width:3%;}
    #recTable th:nth-child(12),#recTable td:nth-child(12){width:5%;}
    #recTable th:nth-child(13),#recTable td:nth-child(13){width:5%;}
    tr:hover td{background:#f8fafc;}
    .tag{display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700;}
    .tag.on{background:#dcfce7; color:#16a34a;} .tag.off{background:#fee2e2; color:#ef4444;}
    .scroll{overflow-x:auto;}
    .leave-input{width:70px; padding:6px; border:2px solid var(--line); border-radius:6px; font-size:13px;}
    .toast{position:fixed; top:20px; right:20px; background:rgba(15,23,42,.92); color:#fff;
      padding:14px 20px; border-radius:10px; font-size:14px; display:none; z-index:99;}
    .toast.show{display:block;}
    .muted{color:var(--gray); font-size:13px; margin:6px 0;}
    .export-row{display:flex; gap:8px; margin-top:10px; margin-bottom:16px; flex-wrap:wrap;}

    /* ===== スマホ対応（PCレイアウトに影響しない） ===== */
    @media (max-width: 768px){
      .wrap{padding:12px; width:100%;}
      header{padding:12px 14px;}
      header h1{font-size:14px;}
      .field input,.field select{min-width:0; width:100%;}
      .field{width:100%;}
      .form-row{flex-direction:column; align-items:stretch;}
      .form-row .btn{align-self:flex-start;}
      .tab{padding:9px 12px; font-size:13px;}
      table{font-size:11px;}
      th,td{padding:6px 5px;}
      .leave-input{width:60px;}
      .toast{top:auto; bottom:12px; right:12px; left:12px; text-align:center;}
      .export-row{gap:6px;}
    }

    /* ===== 印刷（PDF出力）スタイル ===== */
    @media print{
      #loginView,.no-print,.tabs,header .btn,
      #panel-users,#panel-sites,.card:first-child,
      .export-row,.form-row{display:none !important;}
      header{padding:8px 12px; box-shadow:none; print-color-adjust:exact; -webkit-print-color-adjust:exact;}
      header h1{font-size:13px;}
      .wrap{padding:8px; width:100%; max-width:100%;}
      .card{box-shadow:none; border:1px solid #ccc; margin-bottom:8px; padding:10px;}
      .panel{display:block !important;}
      .scroll{overflow:visible !important;}
      table{font-size:9px; table-layout:auto;}
      th,td{padding:4px 5px; border:1px solid #ddd;}
      th{background:#e0f2fe !important; color:#0369a1 !important;}
      .muted{font-size:11px; margin:4px 0;}
      .tag{border:1px solid currentColor; padding:1px 4px;}
      body{background:white !important;}
    }
  </style>
</head>
<body>

  <div id="loginView">
    <div class="login">
      <h2>管理画面ログイン</h2>
      <p>旭建設CW出勤簿アプリ</p>
      <input type="text" id="loginId" placeholder="ログインID" autocomplete="username">
      <input type="password" id="loginPass" placeholder="パスワード" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn full" onclick="doLogin()">ログイン</button>
      <p id="loginErr" style="color:#ef4444; margin-top:14px; display:none;">IDまたはパスワードが違います</p>
    </div>
  </div>

  <div id="adminView" style="display:none;">
    <header>
      <h1>旭建設CW出勤簿アプリ ― 管理画面</h1>
      <a href="/" class="btn sm gray no-print">入力画面へ</a>
      <button class="btn sm gray no-print" onclick="logout()">ログアウト</button>
    </header>
    <div class="wrap">
      <div class="tabs no-print">
        <button class="tab on" onclick="showTab('records',this)">出勤記録の閲覧</button>
        <button class="tab" onclick="showTab('users',this)">ユーザー管理</button>
        <button class="tab" onclick="showTab('sites',this)">現場管理</button>
      </div>

      <div class="panel on" id="panel-records">
        <div class="card no-print">
          <h3>絞り込み</h3>
          <div class="form-row">
            <div class="field"><label>氏名で絞り込み</label>
              <select id="fName"><option value="">すべて</option></select></div>
            <div class="field"><label>日付（から）</label><input type="date" id="fFrom"></div>
            <div class="field"><label>日付（まで）</label><input type="date" id="fTo"></div>
            <button class="btn sm" onclick="loadRecords()">表示</button>
            <button class="btn sm gray" onclick="clearFilter()">クリア</button>
          </div>
        </div>

        <div class="card">
          <h3>出勤記録</h3>
          <p class="muted" id="recCount"></p>
          <div class="export-row no-print">
            <button class="btn sm green" onclick="exportCSV()">CSV出力</button>
            <button class="btn sm gray" onclick="exportPDF()">PDF出力（印刷）</button>
            <button class="btn sm green" onclick="exportTimesheetFromFilter()">出勤簿Excel出力</button>
          </div>
          <div class="scroll">
            <table id="recTable">
              <thead><tr>
                <th>日付</th><th>氏名</th><th>出勤</th><th>現場種別</th><th>現場</th><th>出勤数</th>
                <th>残業</th><th>残業時間</th><th>宿泊</th><th>食事</th><th>車両</th>
                <th>自宅〜現場km</th><th>自宅〜集合場所km</th><th>運転者</th><th>同乗者</th><th>登録日時</th>
              </tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="panel" id="panel-users">
        <div class="card">
          <h3>ユーザー登録</h3>
          <div class="form-row">
            <div class="field"><label>氏名</label><input type="text" id="uName" placeholder="例：濵田 光洋"></div>
            <div class="field"><label>有給残日数</label><input type="number" id="uLeave" value="0" step="0.5"></div>
            <button class="btn sm" onclick="addUser()">＋ 登録する</button>
          </div>
        </div>
        <div class="card">
          <h3>登録済みユーザー（有給残日数の編集もここで）</h3>
          <div class="scroll">
            <table id="userTable">
              <thead><tr><th>氏名</th><th>有給残日数</th><th>状態</th><th>操作</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="panel" id="panel-sites">
        <div class="card">
          <h3>現場名 登録</h3>
          <div class="form-row">
            <div class="field"><label>現場名</label><input type="text" id="sName" placeholder="例：〇〇橋梁補修工事"></div>
            <button class="btn sm" onclick="addSite()">＋ 登録する</button>
          </div>
        </div>
        <div class="card">
          <h3>登録済み現場</h3>
          <div class="scroll">
            <table id="siteTable">
              <thead><tr><th>現場名</th><th>状態</th><th>操作</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/xlsx.full.min.js"></script>
  <script>
    var currentRecords = [];

    function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},1800); }

    function getToken(){ return sessionStorage.getItem('adminToken') || ''; }

    function api(path, opts){
      opts = opts || {};
      opts.headers = Object.assign({ 'Authorization': 'Bearer ' + getToken() }, opts.headers || {});
      return fetch('/api' + path, opts).then(function(r){
        if(r.status === 401){ logout(); throw new Error('セッション切れ。再ログインしてください。'); }
        return r.json();
      });
    }

    function logout(){
      sessionStorage.removeItem('adminToken');
      location.reload();
    }

    function doLogin(){
      var id=document.getElementById('loginId').value;
      var pass=document.getElementById('loginPass').value;
      fetch('/api/admin/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id: id, pass: pass})
      })
      .then(function(r){ return r.json(); })
      .then(function(res){
        if(res.ok){
          sessionStorage.setItem('adminToken', res.token);
          document.getElementById('loginView').style.display='none';
          document.getElementById('adminView').style.display='block';
          loadAll();
        } else {
          document.getElementById('loginErr').style.display='block';
        }
      })
      .catch(function(e){ alert('エラー: '+e.message); });
    }

    function showTab(name, el){
      document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
      el.classList.add('on');
      document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on');});
      document.getElementById('panel-'+name).classList.add('on');
    }

    function loadAll(){ loadUsers(); loadSites(); loadRecords(); }

    function exportTimesheetFromFilter(){
      var from = document.getElementById('fFrom').value;
      var d = from ? new Date(from+'T00:00:00') : new Date();
      exportTimesheet(d.getFullYear(), d.getMonth()+1);
    }

    async function exportTimesheet(year, month){
      try {
        var users = await api('/admin/users').then(function(list){ return list.filter(function(u){ return u.active; }); });
        if(users.length === 0){ toast('有効なユーザーがいません'); return; }
        var daysInMonth = new Date(year, month, 0).getDate();
        var fromDate = year + '-' + String(month).padStart(2,'0') + '-01';
        var toDate   = year + '-' + String(month).padStart(2,'0') + '-' + String(daysInMonth).padStart(2,'0');
        var allRecs = await api('/admin/records?from=' + fromDate + '&to=' + toDate);
        var recsByUser = {};
        users.forEach(function(u){ recsByUser[u.name] = []; });
        allRecs.forEach(function(r){ if(recsByUser[r.name]) recsByUser[r.name].push(r); });
        var reiwa = year - 2018;
        var wb = {SheetNames:[], Sheets:{}};
        users.forEach(function(u){
          var ws = buildTimesheetSheet(u.name, recsByUser[u.name] || [], year, month, reiwa);
          var sheetName = u.name.slice(0, 31);
          wb.SheetNames.push(sheetName);
          wb.Sheets[sheetName] = ws;
        });
        var fileName = '出勤簿_令和' + reiwa + '年' + month + '月分.xlsx';
        XLSX.writeFile(wb, fileName);
        toast(users.length + '名分の出勤簿を出力しました');
      } catch(e){ toast('エラー: ' + e.message); }
    }

    function buildTimesheetSheet(userName, records, year, month, reiwa){
      var daysInMonth = new Date(year, month, 0).getDate();
      var recMap = {};
      records.forEach(function(r){ recMap[r.date] = r; });

      var carCounts = {};
      records.forEach(function(r){ if(r.carType) carCounts[r.carType]=(carCounts[r.carType]||0)+1; });
      var carType = Object.keys(carCounts).sort(function(a,b){return carCounts[b]-carCounts[a];})[0]||'';

      var totalWorkDays=0;
      records.forEach(function(r){ totalWorkDays+=(r.workDays||0); });
      var totalWorkHours=Math.round(totalWorkDays*75)/10;

      var ws={}, merges=[];

      // セル書き込み
      function W(r,c,v,s){
        var ref=XLSX.utils.encode_cell({r:r,c:c});
        ws[ref]={v:(v===null||v===undefined)?'':v, t:(typeof v==='number')?'n':'s', s:s||{}};
      }
      function M(r1,c1,r2,c2){ merges.push({s:{r:r1,c:c1},e:{r:r2,c:c2}}); }

      // ─── 罫線（黒） ───
      var T={style:'thin',  color:{rgb:'000000'}};
      var M_={style:'medium',color:{rgb:'000000'}};
      var bdT={top:T,bottom:T,left:T,right:T};           // 細線全周
      var bdM={top:M_,bottom:M_,left:M_,right:M_};       // 太線全周
      var bdTM={top:T,bottom:M_,left:T,right:T};          // 下だけ太線

      // ─── 塗りつぶし ───
      function fl(rgb){return {patternType:'solid',fgColor:{rgb:rgb}};}
      var F_TITLE = fl('1E3A5F'); // 紺
      var F_HDR   = fl('2563EB'); // 青（ヘッダー行）
      var F_SUB   = fl('DBEAFE'); // 薄青（サマリーラベル）
      var F_SUM   = fl('EFF6FF'); // さらに薄青（サマリー値）
      var F_GRAY  = fl('E5E7EB'); // グレー（フッター・車両種別）
      var F_SUN   = fl('FEE2E2'); // 薄赤（日曜）
      var F_SAT   = fl('DBEAFE'); // 薄青（土曜）
      var F_NTICE = fl('FEFCE8'); // 薄黄（注意事項）

      // ─── 配置 ───
      var CC={horizontal:'center',vertical:'center'};
      var CL={horizontal:'left',  vertical:'center'};
      var CR={horizontal:'right', vertical:'center'};
      var CW={horizontal:'center',vertical:'center',wrapText:true};

      // ─── フォント ───
      function f(sz,bold,white){
        var o={sz:sz}; if(bold)o.bold=true; if(white)o.color={rgb:'FFFFFF'}; return o;
      }

      // ─── スタイル生成 ───
      function s(font,fill,align,border){
        var o={};
        if(font)   o.font=font;
        if(fill)   o.fill=fill;
        if(align)  o.alignment=align;
        if(border) o.border=border;
        return o;
      }

      // ━━━━ R0: タイトル ━━━━
      W(0,1,'令和'+reiwa+'年'+month+'月分　出勤簿　　旭建設株式会社',
        s(f(13,true,true),F_TITLE,CC,bdM));
      M(0,1,0,10);

      // ━━━━ R1: 氏名 ━━━━
      W(1,1,'氏　名', s(f(9,true),F_GRAY,CC,bdT));
      W(1,2,userName, s(f(12,true),null,CL));
      M(1,2,1,6);
      W(1,7,'（作業員用）', s(f(9),null,CL));
      M(1,7,1,10);

      // ━━━━ R2: スペーサー ━━━━

      // ━━━━ R3: サマリーラベル ━━━━
      // 「労働日数」「残業時間」「その他」の3区画をB-K全体に均等配置
      W(3,1,'労働日数（合計）', s(f(8,true),F_SUB,CC,{top:M_,left:M_,right:T,bottom:T}));
      M(3,1,3,3);
      W(3,2,'',s(null,F_SUB,null,{top:M_,bottom:T}));
      W(3,3,'',s(null,F_SUB,null,{top:M_,right:T,bottom:T}));
      W(3,4,'残業時間（合計）', s(f(8,true),F_SUB,CC,{top:M_,left:T,right:T,bottom:T}));
      M(3,4,3,6);
      W(3,5,'',s(null,F_SUB,null,{top:M_,bottom:T}));
      W(3,6,'',s(null,F_SUB,null,{top:M_,right:T,bottom:T}));
      W(3,7,'そ　の　他', s(f(8,true),F_SUB,CC,{top:M_,left:T,right:M_,bottom:T}));
      M(3,7,3,10);
      W(3,8,'',s(null,F_SUB,null,{top:M_,bottom:T}));
      W(3,9,'',s(null,F_SUB,null,{top:M_,bottom:T}));
      W(3,10,'',s(null,F_SUB,null,{top:M_,right:M_,bottom:T}));

      // ━━━━ R4: サマリーサブラベル ━━━━
      var sl=s(f(8,true),F_SUB,CC,bdT);
      W(4,1,'通常出勤',sl); W(4,2,'休日出勤',sl); W(4,3,'合　計',sl);
      W(4,4,'普通時間',sl); W(4,5,'深夜時間',sl); W(4,6,'合　計',sl);
      W(4,7,'有　給', sl); W(4,8,'公　休', sl); W(4,9,'振　替', sl);
      W(4,10,'', s(f(8),F_SUB,CC,{top:T,bottom:T,left:T,right:M_}));

      // ━━━━ R5: サマリー値 ━━━━
      var sv=s(f(10,true),F_SUM,CC,bdT);
      var sv_l=s(f(10,true),F_SUM,CC,{top:T,bottom:M_,left:M_,right:T});
      var sv_r=s(f(10,true),F_SUM,CC,{top:T,bottom:M_,left:T,right:M_});
      W(5,1,totalWorkDays,sv_l);
      W(5,2,0,sv); W(5,3,totalWorkDays,sv);
      W(5,4,0,sv); W(5,5,0,sv); W(5,6,0,sv);
      W(5,7,0,sv); W(5,8,0,sv); W(5,9,0,sv);
      W(5,10,'',s(f(10),F_SUM,CC,{top:T,bottom:M_,left:T,right:M_}));

      // ━━━━ R6: スペーサー ━━━━

      // ━━━━ R7-17: 就業時間・注意事項 ━━━━
      var ns=s(f(8),F_NTICE,CL);
      var ntxts=[
        '就業時間：始業 午前8時00分　終業 午後5時00分　休憩 正午1時間（午前10時・午後3時 各15分）　実働 7時間30分',
        '─　注　意　事　項　─',
        '１．作業責任者の指示、注意事項を遵守すること。',
        '２．作業中は保護具アゴひもを必ず着用し、くわえタバコやポイ捨てはしないこと。',
        '３．重機の運転は免許所持者で現場代理人の許可を受けたものとし、免許証は所持すること。',
        '４．機械・器具は毎朝始業前点検を実施すること。',
        '５．機械・器具は作業終了後指定場所に整理整頓して保管収納すること（５S活動の推進）。',
        '６．作業中の傷病については些細なことでも責任者に申し出ること。',
        '７．報告連絡相談を必ず行うこと。',
        '８．不安全行動や軽率な行動はしないこと。',
        '９．残業及び休日作業の場合には事前に稟議書にて会社決裁を受けること。',
      ];
      ntxts.forEach(function(txt,i){ var r=7+i; W(r,1,txt,ns); M(r,1,r,10); });

      // ━━━━ R18: 車両種別 ━━━━
      W(18,7,'車両種別', s(f(8,true),F_GRAY,CC,bdT)); M(18,7,18,8);
      W(18,8,'',s(null,F_GRAY,null,bdT));
      W(18,9,carType, s(f(9,true),null,CC,bdT)); M(18,9,18,10);
      W(18,10,'',s(null,null,null,bdT));

      // ━━━━ R19: テーブルヘッダー ━━━━
      var hSt=s(f(9,true,true),F_HDR,CW,bdM);
      var hdrs=[
        [1,'月\n日'],[2,'出欠\n時間'],[3,'労働\n時間'],[4,'現　　場　　名'],
        [5,'残業\n開始'],[6,'残業\n終了'],[7,'現場まで\nの距離'],[8,'通勤\n状況'],[9,'交通費\n等'],[10,'他']
      ];
      hdrs.forEach(function(x){ W(19,x[0],x[1],hSt); });

      // ━━━━ R20+: 日次データ ━━━━
      for(var day=1; day<=daysInMonth; day++){
        var r=19+day;
        var ds=year+'-'+String(month).padStart(2,'0')+'-'+String(day).padStart(2,'0');
        var dow=new Date(ds+'T00:00:00').getDay();
        var dateLabel=(day===1)?parseFloat(month+'.1'):day;
        var rf=(dow===0)?F_SUN:(dow===6)?F_SAT:null;

        // スタイルを都度生成（ループ内function宣言を避ける）
        var stC={font:f(9),alignment:CC,border:bdT}; if(rf) stC.fill=rf;
        var stL={font:f(9),alignment:CL,border:bdT}; if(rf) stL.fill=rf;
        var stR={font:f(9),alignment:CR,border:bdT}; if(rf) stR.fill=rf;
        // 左端セル（月・日列）は左辺を太線に
        var stD={font:f(9),alignment:CC,border:{top:T,bottom:T,left:M_,right:T}}; if(rf) stD.fill=rf;

        var rec=recMap[ds];
        W(r,1,dateLabel,stD);

        if(!rec){
          [2,3,4,5,6,7,8,9,10].forEach(function(c){ W(r,c,'',stL); });
          continue;
        }

        var attTime='',workHours='';
        if(rec.attendance==='終日')      {attTime='8:00～17:00'; workHours=(rec.workDays||1)*7.5;}
        else if(rec.attendance==='午前') {attTime='8:00～12:00'; workHours=3.75;}
        else if(rec.attendance==='午後') {attTime='13:00～17:00';workHours=3.75;}
        else if(rec.attendance==='休み') {attTime='休み';}

        var otStart='',otEnd='';
        if(rec.overtime==='あり'){otStart=rec.otStart||'';otEnd=rec.otEnd||'';}

        var dist=(rec.commuteGenba&&rec.commuteGenba!=='0')?rec.commuteGenba+'km':'';
        var hasCarpool=(rec.passengers&&rec.passengers.trim()!=='')||(rec.driver&&rec.driver!==userName);
        var commute=dist?(hasCarpool?'同乗有':'同乗無'):'';

        W(r,2,attTime,                            stC);
        W(r,3,workHours===''?'':workHours,        stR);
        W(r,4,rec.site||'',                       stL);
        W(r,5,otStart,                            stC);
        W(r,6,otEnd,                              stC);
        W(r,7,dist,                               stC);
        W(r,8,commute,                            stC);
        W(r,9,'',                                 stC);
        W(r,10,'',                                stC);
      }

      // ━━━━ フッター ━━━━
      var fR=20+daysInMonth;
      var ftC=s(f(9),F_GRAY,CC,{top:M_,bottom:M_,left:M_,right:T});
      var ftN=s(f(9),F_GRAY,CC,{top:M_,bottom:M_,left:T,right:T});
      var ftR=s(f(10,true),F_GRAY,CR,{top:M_,bottom:M_,left:T,right:M_});
      W(fR,1,'合　計', s(f(9,true),F_GRAY,CC,{top:M_,bottom:M_,left:M_,right:T}));
      [2,3,5,6,7,8,9].forEach(function(c){W(fR,c,'',ftN);});
      W(fR,4,totalWorkHours,ftR);
      W(fR,10,'',s(f(9),F_GRAY,CC,{top:M_,bottom:M_,left:T,right:M_}));
      W(fR+1,3,'（単位：時間）',s(f(8),null,CL));
      M(fR+1,3,fR+1,5);

      // ━━━━ シート設定 ━━━━
      ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:fR+1,c:10}});
      ws['!merges']=merges;
      ws['!cols']=[
        {wch:0.5}, // A 余白
        {wch:6},   // B 月・日
        {wch:13},  // C 出欠時間
        {wch:7},   // D 労働時間
        {wch:22},  // E 現場名
        {wch:8},   // F 残業開始
        {wch:8},   // G 残業終了
        {wch:9},   // H 現場まで
        {wch:8},   // I 通勤状況
        {wch:8},   // J 交通費等
        {wch:5},   // K 他
      ];
      var rowH=[];
      rowH[0] ={hpt:24}; // タイトル
      rowH[1] ={hpt:18}; // 氏名
      rowH[2] ={hpt:5};  // spacer
      rowH[3] ={hpt:13}; // サマリー見出し
      rowH[4] ={hpt:13}; // サマリーサブラベル
      rowH[5] ={hpt:16}; // サマリー値
      rowH[6] ={hpt:5};  // spacer
      for(var i=7;i<=17;i++) rowH[i]={hpt:9};
      rowH[18]={hpt:13}; // 車両種別
      rowH[19]={hpt:28}; // テーブルヘッダー
      for(var d=1;d<=daysInMonth;d++) rowH[19+d]={hpt:14};
      rowH[fR]  ={hpt:16};
      rowH[fR+1]={hpt:10};
      ws['!rows']=rowH;
      ws['!pageSetup']={paperSize:9,orientation:'portrait',fitToPage:true,fitToWidth:1,fitToHeight:1};
      ws['!margins']={left:0.39,right:0.39,top:0.59,bottom:0.59,header:0.2,footer:0.2};
      return ws;
    }

    function loadUsers(){
      api('/admin/users').then(function(list){
        var tb=document.querySelector('#userTable tbody'); tb.innerHTML='';
        var fName=document.getElementById('fName'); fName.innerHTML='<option value="">すべて</option>';
        list.forEach(function(u){
          var tr=document.createElement('tr');
          tr.innerHTML =
            '<td>'+u.name+'</td>'+
            '<td><input class="leave-input" type="number" step="0.5" value="'+u.leave+'" id="lv_'+u.id+'"> '+
              '<button class="btn sm" onclick="saveLeave(\''+u.id+'\')">保存</button></td>'+
            '<td>'+(u.active?'<span class="tag on">有効</span>':'<span class="tag off">無効</span>')+'</td>'+
            '<td>'+
              '<button class="btn sm gray" onclick="toggleUser(\''+u.id+'\','+(!u.active)+')">'+(u.active?'無効化':'有効化')+'</button> '+
              '<button class="btn sm red" onclick="deleteUser(\''+u.id+'\',\''+u.name+'\')">削除</button>'+
            '</td>';
          tb.appendChild(tr);
          if(u.active) fName.add(new Option(u.name, u.name));
        });
      }).catch(function(e){ toast(e.message); });
    }

    function addUser(){
      var n=document.getElementById('uName').value.trim();
      var l=document.getElementById('uLeave').value;
      if(!n){ alert('氏名を入力してください'); return; }
      api('/admin/users', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name:n, leave:l})
      }).then(function(){ toast('登録しました'); document.getElementById('uName').value=''; document.getElementById('uLeave').value='0'; loadUsers(); })
      .catch(function(e){ toast(e.message); });
    }

    function saveLeave(id){
      var v=document.getElementById('lv_'+id).value;
      api('/admin/users/'+id+'/leave', {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({leave:v})
      }).then(function(){ toast('有給残日数を更新しました'); })
      .catch(function(e){ toast(e.message); });
    }

    function deleteUser(id, name){
      if(!confirm('「'+name+'」を削除しますか？\n※この操作は元に戻せません。')) return;
      api('/admin/users/'+id, { method:'DELETE' })
        .then(function(){ toast('削除しました'); loadUsers(); })
        .catch(function(e){ toast(e.message); });
    }

    function toggleUser(id, active){
      api('/admin/users/'+id+'/active', {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({active:active})
      }).then(function(){ loadUsers(); })
      .catch(function(e){ toast(e.message); });
    }

    function loadSites(){
      api('/admin/sites').then(function(list){
        var tb=document.querySelector('#siteTable tbody'); tb.innerHTML='';
        list.forEach(function(s){
          var tr=document.createElement('tr');
          tr.innerHTML =
            '<td>'+s.name+'</td>'+
            '<td>'+(s.active?'<span class="tag on">有効</span>':'<span class="tag off">無効</span>')+'</td>'+
            '<td>'+
              '<button class="btn sm gray" onclick="toggleSite(\''+s.id+'\','+(!s.active)+')">'+(s.active?'無効化':'有効化')+'</button> '+
              '<button class="btn sm red" onclick="deleteSite(\''+s.id+'\',\''+s.name+'\')">削除</button>'+
            '</td>';
          tb.appendChild(tr);
        });
      }).catch(function(e){ toast(e.message); });
    }

    function addSite(){
      var n=document.getElementById('sName').value.trim();
      if(!n){ alert('現場名を入力してください'); return; }
      api('/admin/sites', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name:n})
      }).then(function(){ toast('登録しました'); document.getElementById('sName').value=''; loadSites(); })
      .catch(function(e){ toast(e.message); });
    }

    function deleteSite(id, name){
      if(!confirm('「'+name+'」を削除しますか？\n※この操作は元に戻せません。')) return;
      api('/admin/sites/'+id, { method:'DELETE' })
        .then(function(){ toast('削除しました'); loadSites(); })
        .catch(function(e){ toast(e.message); });
    }

    function toggleSite(id, active){
      api('/admin/sites/'+id+'/active', {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({active:active})
      }).then(function(){ loadSites(); })
      .catch(function(e){ toast(e.message); });
    }

    function clearFilter(){
      document.getElementById('fName').value='';
      document.getElementById('fFrom').value='';
      document.getElementById('fTo').value='';
      loadRecords();
    }

    function loadRecords(){
      var name=document.getElementById('fName').value;
      var from=document.getElementById('fFrom').value;
      var to=document.getElementById('fTo').value;
      var q=new URLSearchParams();
      if(name) q.set('name',name);
      if(from) q.set('from',from);
      if(to)   q.set('to',to);
      api('/admin/records'+(q.toString()?'?'+q.toString():'')).then(function(list){
        currentRecords = list;
        var tb=document.querySelector('#recTable tbody'); tb.innerHTML='';
        document.getElementById('recCount').textContent = list.length + ' 件';
        list.forEach(function(r){
          var ot=(r.overtime==='あり')?(r.otStart+'〜'+r.otEnd):'';
          var tr=document.createElement('tr');
          tr.innerHTML =
            '<td>'+r.date+'</td><td>'+r.name+'</td><td>'+r.attendance+'</td>'+
            '<td>'+(r.siteMode||'')+'</td><td>'+(r.site||'')+'</td><td>'+(r.workDays!=null?r.workDays:'')+'</td>'+
            '<td>'+r.overtime+'</td><td>'+ot+'</td><td>'+(r.stay||'')+'</td><td>'+(r.meal||'')+'</td>'+
            '<td>'+r.carType+'</td>'+
            '<td>'+(r.commuteGenba||'')+'</td><td>'+(r.commuteShugo||'')+'</td>'+
            '<td>'+r.driver+'</td><td>'+(r.passengers||'')+'</td><td>'+r.created+'</td>';
          tb.appendChild(tr);
        });
      }).catch(function(e){ toast(e.message); });
    }

    /* CSV出力（BOM付きUTF-8でExcelでも文字化けしない） */
    function exportCSV(){
      if(currentRecords.length===0){ toast('出力するデータがありません'); return; }
      var header=['日付','氏名','出勤','現場種別','現場','出勤数','残業','残業時間','宿泊','食事','車両','自宅〜現場km','自宅〜集合場所km','運転者','同乗者','登録日時'];
      var rows=currentRecords.map(function(r){
        var ot=(r.overtime==='あり')?(r.otStart+'〜'+r.otEnd):'';
        return [
          r.date, r.name, r.attendance, r.siteMode||'', r.site||'',
          r.workDays!=null?r.workDays:'', r.overtime, ot,
          r.stay||'', r.meal||'', r.carType||'',
          r.commuteGenba||'', r.commuteShugo||'', r.driver||'', r.passengers||'', r.created||''
        ];
      });
      var csv=[header].concat(rows).map(function(row){
        return row.map(function(c){ return '"'+String(c===null||c===undefined?'':c).replace(/"/g,'""')+'"'; }).join(',');
      }).join('\r\n');
      var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url;
      var today=new Date().toLocaleDateString('sv-SE').replace(/-/g,'');
      a.download='出勤記録_'+today+'.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    /* PDF出力（ブラウザの印刷ダイアログ → 「PDFとして保存」） */
    function exportPDF(){
      if(currentRecords.length===0){ toast('出力するデータがありません'); return; }
      window.print();
    }
  </script>
